name: "CLA Assistant"
# Temporarily disabled: no automatic CLA checks on PRs or comments. Restore by switching
# `on` back to issue_comment + pull_request_target (see git history).
on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/gowrav-vishwakarma/qllm2/blob/main/CLA.md'
          branch: 'main'
          allowlist: dependabot[bot],bot*
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement](https://github.com/gowrav-vishwakarma/qllm2/blob/main/CLA.md).

            Please read the CLA and then sign by posting a comment with the following text:

            > I have read the CLA Document and I hereby sign the CLA

            This is a one-time requirement — once signed, it applies to all your future contributions.
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
          lock-pullrequest-aftermerge: true
